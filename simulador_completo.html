<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Créditos</title>
</head>
<body>

<header>
  <h1>Sistema Básico de Créditos</h1>
  <link rel="stylesheet" href="simulador_completo.css">
</header>

<nav>
  <button onclick="mostrarSeccion('parametros');">Parámetros</button>
  <button onclick="mostrarSeccion('clientes');">Clientes</button>
</nav>

<section id="parametros">
  <h2>Configurar Parámetros</h2>

  <label>Tasa de interés:</label>
  <input type="number" id="tasaInteres" min="10" max="20" value="15">
  <span>%</span>

  <br>
  <input type="button" value="Guardar tasa" onclick="guardarTasa();">

  <p id="mensajeTasa"></p>
</section>

<section id="clientes">
  <h2>Registro de Clientes</h2>
  <h5>Cédula</h5>
    <input type="text" id="txtCedula" placeholder="Cedula"/>
  <h5>Nombre</h5>
    <input type="text" id="txtNombre" placeholder="Nombre"/>
  <h5>Apellido</h5>
    <input type="text" id="txtApellido" placeholder="Apellido"/>
  <h5>Ingresos</h5>
    <input type="number" id="txtIngresos" placeholder="Ingresos"/>
  <h5>Egresos</h5>
    <input type="number" id="txtEgresos" placeholder="Ingresos"/>

  <br>

  <input type="button" value="Guardar cliente" onclick="guardarCliente();" />
  <button onclick="limpiar();">Limpiar</button>

  <table>
    <thead>
      <tr>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Ingresos</th>
        <th>Egresos</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaClientes">
        <tr>
          <td>1712345678</td>
          <td>Juan</td>
          <td>Pérez</td>
          <td>1200</td>
          <td>500</td>
          <td>
            <input type='button' value='Actualizar' onclick="seleccionarCliente('1712345678');">
            <input type='button' value='Eliminar'   onclick="eliminarCliente('1712345678');">
          </td>
        </tr>
        <tr>
          <td>1723456789</td>
          <td>María</td>
          <td>Gómez</td>
          <td>1500</td>
          <td>600</td>
          <td>
            <input type='button' value='Actualizar' onclick="seleccionarCliente('1723456789');"/>
            <input type='button' value='Eliminar'   onclick="eliminarCliente('1723456789');"/>
          </td>
        </tr>
        <tr>
          <td>1734567890</td>
          <td>Carlos</td>
          <td>Ramírez</td>
          <td>900</td>
          <td>350</td>
          <td>
            <input type='button' value='Actualizar' onclick="seleccionarCliente('1734567890');"/>
            <input type='button' value='Eliminar'   onclick="eliminarCliente('1734567890');"/>
          </td>
        </tr>
    </tbody>
  </table>
</section>

<script src="simulador_completo.js"></script>
<script src="utilitarios.js"></script>
</body>
</html>
